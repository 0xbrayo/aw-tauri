name: Arch Linux Container Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Allows manual workflow runs
  workflow_dispatch:

jobs:
  arch-container:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Update system and install basic packages
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm base-devel git

    # Example step showing how to install additional packages
    - name: Install additional packages
      run: |
        pacman -S --noconfirm python python-pip

    # Example step showing how to run commands
    - name: Run your commands
      run: |
        python --version
        echo "Running in Arch Linux container"
        cat /etc/os-release

    # Example step showing how to run your build/test commands
    - name: Build and test
      run: |
        # Add your build/test commands here
        echo "Add your build steps here"


