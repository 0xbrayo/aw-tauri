# From: https://tauri.app/v1/guides/building/cross-platform

name: Release fast test
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          # - platform: 'ubuntu-22.04'
          # - platform: 'ubuntu-22.04-arm' # for Arm based linux.
          # - platform: 'windows-latest'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        # You can remove libayatana-appindicator3-dev if you don't use the system tray feature.
        run: |
          sudo apt-get update
           sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      
      - name: Install dependencies (ubuntu-arm only)
        if: matrix.platform == 'ubuntu-22.04-arm'
        # You can remove libayatana-appindicator3-dev if you don't use the system tray feature.
        run: |
          sudo apt-get update
           sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install node dependencies
        run: npm install

      - name: Prebuild
        run: make prebuild

      - name: Build the app
        uses: tauri-apps/tauri-action@v0

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # This only works if your workflow triggers on new tags.
          releaseName: 'aw-tauri v__VERSION__' # tauri-action replaces \_\_VERSION\_\_ with the app version.
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
  zip-artifacts:
      needs: release
      runs-on: ubuntu-latest
      permissions:
        contents: write
      
      steps:
        - name: Get draft release
          id: get_draft
          uses: cardinalby/git-get-release-action@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            draft: true
            latest: true
  
        - name: Download release assets
          run: |
            mkdir -p artifacts
            cd artifacts
            for asset_url in $(echo '${{ steps.get_draft.outputs.assets }}' | jq -r '.[].url'); do
              curl -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    -H "Accept: application/octet-stream" \
                    -o "$(echo $asset_url | jq -r '.name')" \
                    "$asset_url"
            done
  
        - name: Zip artifacts and delete originals
          run: |
            cd artifacts
            for f in *; do
              if [ -f "$f" ]; then
                mkdir "${f%.*}"
                mv "$f" "${f%.*}/"
                (cd "${f%.*}" && zip -r "../${f%.*}.zip" .)
              fi
            done
            cd ..
  
        - name: Delete original release assets
          uses: mknejp/delete-release-assets@v1
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            tag: ${{ github.ref_name }}
            assets: '*'
            fail-if-no-assets: true
  
        - name: Upload zipped artifacts to release
          uses: softprops/action-gh-release@v2
          with:
            files: artifacts/*.zip
            tag_name: ${{ github.ref_name }}
            draft: true
            fail_on_unmatched_files: true
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}